# eDEX-OS Hyprland configuration — live & installed default
# eDEX-DE auto-starts full-screen; all other windows float above it

monitor=,preferred,auto,1

exec-once = /usr/bin/edex-de
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = nm-applet --indicator
exec-once = dunst
exec-once = swww-daemon && swww img /usr/share/edex-os/wallpapers/default.jpg

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = yes
        tap-to-click = yes
    }
}

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 2
    col.active_border = rgba(00e5ffff)
    col.inactive_border = rgba(00e5ff33)
    layout = dwindle
}

decoration {
    rounding = 0
    blur {
        enabled = true
        size = 8
        passes = 2
    }
    drop_shadow = yes
    shadow_color = rgba(00e5ff44)
}

animations {
    enabled = yes
    bezier = edex, 0.16, 1, 0.3, 1
    animation = windows, 1, 4, edex
    animation = fade, 1, 3, edex
    animation = workspaces, 1, 4, edex
}

# eDEX-DE fills the screen; everything else floats over it
windowrulev2 = fullscreen, class:^(edex-de)$
windowrulev2 = float, class:^(?!edex-de).*$
windowrulev2 = size 1200 800, class:^(?!edex-de).*$
windowrulev2 = center, class:^(?!edex-de).*$

$mainMod = SUPER

bind = $mainMod, Return, exec, kitty
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod, E, exec, nemo
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)"
bind = , Print, exec, grim -g "$(slurp)"
bind = CTRL SHIFT, P, exec, hyprctl dispatch focuswindow class:edex-de

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
