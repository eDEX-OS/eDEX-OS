DEFAULT arch64
LABEL arch64
  MENU LABEL Boot eDEX-OS (x86_64, BIOS)
  LINUX /arch/boot/x86_64/vmlinuz-linux-cachyos
  INITRD /arch/boot/intel-ucode.img,/arch/boot/amd-ucode.img,/arch/boot/x86_64/initramfs-linux-cachyos.img
  APPEND archisobasedir=arch archisolabel=%ARCHISO_LABEL% driver=free quiet splash loglevel=3

LABEL arch64_copytoram
  MENU LABEL Boot eDEX-OS — Copy to RAM
  LINUX /arch/boot/x86_64/vmlinuz-linux-cachyos
  INITRD /arch/boot/intel-ucode.img,/arch/boot/amd-ucode.img,/arch/boot/x86_64/initramfs-linux-cachyos.img
  APPEND archisobasedir=arch archisolabel=%ARCHISO_LABEL% driver=free copytoram quiet splash
