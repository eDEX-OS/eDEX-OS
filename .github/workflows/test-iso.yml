name: ISO Smoke Test

on:
  workflow_run:
    workflows: ["Build eDEX-OS ISO"]
    types: [completed]

jobs:
  test:
    name: QEMU Boot Test
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Pull latest submodule
        run: git submodule update --remote --recursive

      - name: Install QEMU and OVMF
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf

      - name: Download ISO artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: build-iso.yml
          name: edex-os-iso-.*
          name_is_regexp: true
          path: out/
          allow_forks: false
          workflow_conclusion: success

      - name: Run QEMU smoke test
        timeout-minutes: 8
        run: |
          ISO=$(ls out/*.iso | head -1)
          echo "==> Testing: $ISO"
          OVMF=$(find /usr/share -name 'OVMF_CODE*.fd' -o -name 'OVMF.fd' 2>/dev/null | head -1)
          echo "==> OVMF firmware: $OVMF"
          timeout 420 qemu-system-x86_64 \
            -enable-kvm \
            -m 4096 \
            -cpu host \
            -smp 2 \
            ${OVMF:+-drive if=pflash,format=raw,readonly=on,file="$OVMF"} \
            -drive "file=${ISO},media=cdrom,readonly=on" \
            -boot d \
            -nographic \
            -serial stdio \
            -no-reboot \
            2>&1 | tee /tmp/qemu-output.txt || true

          if grep -q "eDEX-OS\|GNU GRUB\|Loading Linux\|Reached target" /tmp/qemu-output.txt; then
            echo "==> PASSED: Boot sequence detected"
          else
            echo "==> WARNING: Could not confirm boot sequence"
            tail -50 /tmp/qemu-output.txt
          fi
