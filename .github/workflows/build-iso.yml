name: Build eDEX-OS ISO

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-iso:
    name: Build ISO
    # Requires self-hosted Arch/CachyOS runner labeled 'arch-linux'
    # See README.md for runner setup instructions
    runs-on: [self-hosted, arch-linux]

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install archiso
        run: sudo pacman -S --needed --noconfirm archiso

      - name: Bootstrap CachyOS repos (if not present)
        run: |
          if ! pacman-conf -l | grep -q cachyos; then
            sudo pacman-key --recv-keys F3B607488DB35A47 --keyserver keyserver.ubuntu.com
            sudo pacman-key --lsign-key F3B607488DB35A47
            sudo pacman -U --noconfirm \
              'https://mirror.cachyos.org/repo/x86_64/cachyos/cachyos-keyring-3-1-any.pkg.tar.zst' \
              'https://mirror.cachyos.org/repo/x86_64/cachyos/cachyos-mirrorlist-18-1-any.pkg.tar.zst'
          fi

      - name: Install build dependencies
        run: |
          sudo pacman -S --needed --noconfirm \
            nodejs npm base-devel \
            webkit2gtk-4.1 gtk3 libayatana-appindicator patchelf

      - name: Install Rust
        run: |
          if ! command -v rustc &>/dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --no-modify-path
            source "$HOME/.cargo/env"
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build eDEX-DE
        run: bash scripts/build-de.sh

      - name: Determine ISO version
        id: version
        run: |
          VERSION=$(date +%Y.%m.%d)
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "iso_name=eDEX-OS-x86_64-${VERSION}.iso" >> "$GITHUB_OUTPUT"

      - name: Build ISO
        run: |
          sudo bash buildiso.sh
          ISO_FILE=$(ls out/*.iso | head -1)
          NEW_NAME="out/${{ steps.version.outputs.iso_name }}"
          [[ "$ISO_FILE" != "$NEW_NAME" ]] && sudo mv "$ISO_FILE" "$NEW_NAME" || true

      - name: Generate checksums
        run: |
          cd out
          ISO="${{ steps.version.outputs.iso_name }}"
          sha256sum "$ISO" > "${ISO}.sha256"
          sha512sum "$ISO" > "${ISO}.sha512"
          echo "==> Checksums:"
          cat "${ISO}.sha256"

      - name: GPG sign (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          cd out
          ISO="${{ steps.version.outputs.iso_name }}"
          echo "$GPG_PASSPHRASE" | gpg --batch --yes --passphrase-fd 0 \
            --detach-sign --armor "$ISO"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: edex-os-iso-${{ steps.version.outputs.version }}
          path: |
            out/*.iso
            out/*.sha256
            out/*.sha512
            out/*.asc
          retention-days: 30

      - name: Clean up work directory
        if: always()
        run: sudo rm -rf /tmp/edex-os-work

  release:
    name: Create GitHub Release
    needs: build-iso
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: edex-os-iso-${{ github.ref_name }}
          path: out/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "eDEX-OS ${{ github.ref_name }}"
          body: |
            ## eDEX-OS ${{ github.ref_name }}

            Privacy-focused CachyOS/Arch-based Linux with the eDEX-DE sci-fi Hyprland desktop.

            ### Highlights
            - **linux-cachyos** kernel (BORE/EEVDF scheduler)
            - **Tor** dual-mode: SOCKS5 proxy + full transparent proxy (off by default)
            - **Tailscale** mesh VPN with peer/exit-node control
            - **WireGuard & OpenVPN** via NetworkManager
            - **dnscrypt-proxy** DNS-over-HTTPS with DNSSEC
            - **Calamares** GUI installer
            - **yay** and **paru** AUR helpers pre-installed
            - Privacy Control Panel: `Ctrl+Shift+P` in eDEX-DE

            ### Verify
            ```bash
            sha256sum -c eDEX-OS-x86_64-*.iso.sha256
            ```
          files: |
            out/*.iso
            out/*.sha256
            out/*.sha512
            out/*.asc
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
