name: Build eDEX-OS ISO

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── Job 1: Build eDEX-DE binary on ubuntu-latest ─────────────────────────────
  build-de:
    name: Build eDEX-DE binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Pull latest submodule
        run: git submodule update --remote --recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            lld \
            llvm \
            libasound2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install JS dependencies
        run: cd desktop && npm ci

      - name: Build Tauri app
        run: cd desktop && npm run tauri build

      - name: Find and stage DE binary
        id: find-bin
        run: |
          echo "==> Searching target/release/ for executable binary..."
          find desktop/src-tauri/target/release -maxdepth 1 -type f | while read f; do
            [[ -x "$f" ]] && echo "  EXEC: $f"
          done
          # Expected path
          BIN="desktop/src-tauri/target/release/edex-de"
          if [[ ! -f "$BIN" ]]; then
            # Fallback: find any non-library executable in target/release
            BIN=$(find desktop/src-tauri/target/release -maxdepth 1 -type f -executable \
              ! -name '*.so' ! -name '*.a' ! -name '*.d' 2>/dev/null | head -1)
            echo "==> Fallback binary: $BIN"
          else
            echo "==> Found expected binary: $BIN"
          fi
          mkdir -p /tmp/edex-bin
          cp "$BIN" /tmp/edex-bin/edex-de
          echo "path=/tmp/edex-bin/edex-de" >> "$GITHUB_OUTPUT"

      - name: Upload DE binary
        uses: actions/upload-artifact@v4
        with:
          name: edex-de-binary
          path: /tmp/edex-bin/edex-de
          if-no-files-found: error
          retention-days: 1

  # ── Job 2: Build ISO inside privileged Arch Linux Docker container ────────────
  build-iso:
    name: Build ISO
    needs: build-de
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      iso_name: ${{ steps.version.outputs.iso_name }}

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Pull latest submodule
        run: git submodule update --remote --recursive

      - name: Download eDEX-DE binary
        uses: actions/download-artifact@v4
        with:
          name: edex-de-binary
          path: iso/airootfs/usr/bin/

      - name: Set binary executable
        run: chmod +x iso/airootfs/usr/bin/edex-de

      - name: Determine ISO version
        id: version
        run: |
          VERSION=$(date +%Y.%m.%d)
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "iso_name=eDEX-OS-x86_64-${VERSION}.iso" >> "$GITHUB_OUTPUT"

      - name: Ensure loop module loaded on host
        run: sudo modprobe loop

      - name: Build ISO in Arch Linux container
        run: |
          docker run --rm --privileged \
            --device /dev/fuse \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            archlinux:latest \
            bash /workspace/scripts/ci-build-iso.sh

      - name: Rename ISO to versioned name
        run: |
          ISO=$(ls out/*.iso 2>/dev/null | head -1)
          NEW="out/${{ steps.version.outputs.iso_name }}"
          [[ -n "$ISO" && "$ISO" != "$NEW" ]] && mv "$ISO" "$NEW" || true

      - name: Generate checksums
        run: |
          cd out
          ISO="${{ steps.version.outputs.iso_name }}"
          sha256sum "$ISO" > "${ISO}.sha256"
          sha512sum "$ISO" > "${ISO}.sha512"
          echo "==> Checksums:"
          cat "${ISO}.sha256"

      - name: GPG sign (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          cd out
          ISO="${{ steps.version.outputs.iso_name }}"
          echo "$GPG_PASSPHRASE" | gpg --batch --yes --passphrase-fd 0 \
            --detach-sign --armor "$ISO"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: edex-os-iso-${{ steps.version.outputs.version }}
          path: |
            out/*.iso
            out/*.sha256
            out/*.sha512
            out/*.asc
          retention-days: 30

      - name: Clean up work directory
        if: always()
        run: rm -rf /tmp/edex-os-work

  # ── Job 3: Create GitHub Release on tag push ──────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build-iso
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: edex-os-iso-${{ needs.build-iso.outputs.version }}
          path: out/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "eDEX-OS ${{ github.ref_name }}"
          body: |
            ## eDEX-OS ${{ github.ref_name }}

            Privacy-focused CachyOS/Arch-based Linux with the eDEX-DE sci-fi Hyprland desktop.

            ### Highlights
            - **linux-cachyos** kernel (BORE/EEVDF scheduler)
            - **Tor** dual-mode: SOCKS5 proxy + full transparent proxy (off by default)
            - **Tailscale** mesh VPN with peer/exit-node control
            - **WireGuard & OpenVPN** via NetworkManager
            - **dnscrypt-proxy** DNS-over-HTTPS with DNSSEC
            - **Calamares** GUI installer
            - **yay** and **paru** AUR helpers pre-installed
            - Privacy Control Panel: `Ctrl+Shift+P` in eDEX-DE

            ### Verify
            ```bash
            sha256sum -c eDEX-OS-x86_64-*.iso.sha256
            ```
          files: |
            out/*.iso
            out/*.sha256
            out/*.sha512
            out/*.asc
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
