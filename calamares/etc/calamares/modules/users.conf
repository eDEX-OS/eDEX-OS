---
defaultGroups:
  - name: users
    state: create
  - name: wheel
    state: create
  - name: storage
    state: create
  - name: video
    state: create
  - name: audio
    state: create
  - name: rfkill
    state: create
  - name: network
    state: create
  - name: tor
    state: create

autologinGroup: autologin
doAutologin: false
sudoersGroup: wheel
setRootPassword: false
doReusePassword: true

passwordRequirements:
  minLength: 6
  maxLength: -1

userShell: /bin/fish
