---
# eDEX-OS post-install shell commands
# Runs inside chroot after package installation

script:
  - "-": "chroot /tmp/calamares-root /bin/bash -c 'systemctl enable NetworkManager'"
  - "-": "chroot /tmp/calamares-root /bin/bash -c 'systemctl enable tailscaled'"
  - "-": "chroot /tmp/calamares-root /bin/bash -c 'systemctl enable dnscrypt-proxy'"
  - "-": "chroot /tmp/calamares-root /bin/bash -c 'systemctl enable nftables'"
  - "-": "chroot /tmp/calamares-root /bin/bash -c 'systemctl enable bluetooth'"
  - "-": "chroot /tmp/calamares-root /bin/bash -c 'systemctl enable fstrim.timer'"
  - "-": "chroot /tmp/calamares-root /bin/bash -c 'systemctl enable seatd'"
  - "-": "chroot /tmp/calamares-root /bin/bash -c 'mkdir -p /etc/tor/torrc.d && chmod 750 /etc/tor/torrc.d && chown root:tor /etc/tor/torrc.d 2>/dev/null || true'"
  - "-": "chroot /tmp/calamares-root /bin/bash -c 'echo off > /run/edex-tor-mode 2>/dev/null || true'"
  - "-": "chroot /tmp/calamares-root /bin/bash -c 'chsh -s /usr/bin/fish root 2>/dev/null || true'"
  - "-": "chroot /tmp/calamares-root /bin/bash -c 'sysctl --system 2>/dev/null || true'"
